<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>编辑关键词</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f7; margin:0; }
    .container { max-width: 500px; margin: 0 auto; }
    h2 { margin: 0 0 16px 0; color: #1d1d1f; font-weight: 600; font-size: 18px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #6e6e73; margin-bottom: 4px; font-weight: 500; }
    input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; box-sizing: border-box; background: white; }
    textarea { min-height: 80px; font-family: inherit; resize: vertical; }
    .note { font-size: 11px; color: #86868b; margin-top: 4px; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    button { padding: 8px 20px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
    .btn-primary { background: #0071e3; color: white; }
    .btn-primary:hover { background: #0060c0; }
    .btn-cancel { background: #e8e8ed; color: #1d1d1f; }
    .btn-cancel:hover { background: #d2d2d7; }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="title">编辑关键词</h2>
    <div class="field">
      <label>账号</label>
      <input id="accountName" readonly style="background:#e8e8ed;">
    </div>
    <div class="field">
      <label>搜索关键词（每行一个）</label>
      <textarea id="searchKeywords" placeholder="客服总监&#10;客服总经理"></textarea>
      <div class="note">用于搜索职位的关键词</div>
    </div>
    <div class="field">
      <label>岗位筛选关键词（每行一个）</label>
      <textarea id="jobTitleKeywords" placeholder="总经理&#10;负责人&#10;总监"></textarea>
      <div class="note">职位标题必须包含至少一个关键词才投递</div>
    </div>
    <div class="actions">
      <button class="btn-cancel" onclick="cancel()">取消</button>
      <button class="btn-primary" onclick="save()">保存</button>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    var data = JSON.parse(decodeURIComponent(location.search.slice(1)));
    document.getElementById('title').textContent = '编辑关键词 - ' + data.name;
    document.getElementById('accountName').value = data.name + ' [' + data.platform + ']';
    document.getElementById('searchKeywords').value = (data.search || []).join('\n');
    document.getElementById('jobTitleKeywords').value = (data.jobTitle || []).join('\n');
    function save() {
      var search = document.getElementById('searchKeywords').value.split('\n').filter(function(s){ return s.trim(); });
      var jobTitle = document.getElementById('jobTitleKeywords').value.split('\n').filter(function(s){ return s.trim(); });
      ipcRenderer.send('keywords-saved', { id: data.id, search: search, jobTitle: jobTitle });
      window.close();
    }
    function cancel() { window.close(); }
  </script>
</body>
</html>
